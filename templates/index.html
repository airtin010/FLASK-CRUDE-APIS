<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CRUDEMANAGER</title>
</head>
<body>

    <div class="container">
        <div class="dashboard-container bg-white p-5 rounded shadow-sm text-center">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <h1 class="mb-4">Bem-vindo!</h1>
            
            <p class="lead">Você está conectado com o e-mail:</p>
            <h4 class="text-primary mb-5">{{ session['user_email'] }}</h4>

            <div class="d-grid gap-2">
                <a href="{{ url_for('logout') }}" class="btn btn-danger btn-lg">Log Out</a>
            </div>

        </div>
    </div>
</body>
</html>
